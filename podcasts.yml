# -----------------------------------------------------------------------------
# PODCASTS — deploy to website-content (same place as schedule.yml)
# URL when live: https://content.urn1350.co.uk/podcasts.yml
# -----------------------------------------------------------------------------
#
# HOW TO EDIT
# -----------
# Each podcast is listed under `podcasts:` with a unique key (slug). That key
# is used in the site URL: /podcasts/<slug>
#
#   title        — Display name
#   information  — Blurb / description (use | for multiple lines)
#   spotify      — Spotify *show* ID only (from open.spotify.com/show/THIS_PART)
#   image        — Either:
#                  • filename only, e.g. urngasm.jpg  → loaded from podcasts.urn1350.co.uk
#                  • full URL if the art is hosted elsewhere
#   featured     — "yes" to show on the home page row; "no" or omit for listing only
#
# Spotify embed in the app is: https://open.spotify.com/embed/show/<spotify>
# -----------------------------------------------------------------------------

